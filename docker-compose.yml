services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.local
    ports:
      - "8000:8000"
    volumes:
      # Monta artefactos e código para desenvolvimento sem rebuild
      - ./artifacts:/app/artifacts
      - ./src:/app/src
      - ./api:/app/api
    environment:
      - MODEL_VERSION=1.0.0
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
